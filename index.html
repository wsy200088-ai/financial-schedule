<title>FY26 財務決算時程表</title>
<style>
  :root{
    --cream:#fbf1d7; --peach:#fad6b5; --pink:#faadac; --lilac:#fcdfe5;
    --mint:#daf1ee; --aqua:#b6e3e7; --sky:#cfe3fb; --sage:#cbe8c2;
    --ink:#4a4540; --ink-soft:#7a736b; --line:#ece6dd; --white:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:115%;}
  body{
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",Arial,sans-serif;
    background:#fffdf9; color:var(--ink); line-height:1.4;
    padding:12px 14px 28px;
  }
  .wrap{max-width:1080px;margin:0 auto;}
  header.top{
    background:linear-gradient(120deg,var(--mint),var(--lilac));
    border-radius:14px; padding:11px 18px; margin-bottom:11px;
    box-shadow:0 3px 10px rgba(150,140,125,.12);
    display:flex;align-items:center;flex-wrap:wrap;gap:4px 14px;
  }
  header.top h1{font-size:1.2rem;letter-spacing:.5px;}
  header.top .meta{font-size:.74rem;color:var(--ink-soft);}
  .pills{margin-left:auto;}
  .pill{display:inline-block;background:var(--white);border-radius:999px;
    padding:2px 10px;font-size:.68rem;margin-left:6px;color:var(--ink);}
  .langsw{margin-left:10px;display:flex;gap:5px;}
  .langbtn{cursor:pointer;background:var(--white);border:1.4px solid var(--line);
    border-radius:999px;padding:3px 13px;font-size:.72rem;color:var(--ink-soft);
    user-select:none;transition:.15s;font-weight:600;}
  .langbtn:hover{border-color:var(--aqua);}
  .langbtn.active{background:linear-gradient(135deg,var(--aqua),var(--mint));
    border-color:var(--aqua);color:var(--ink);}

  section.picker{margin-bottom:11px;}
  .picker h2{font-size:.8rem;margin-bottom:6px;color:var(--ink-soft);font-weight:600;}
  .cards{display:grid;grid-template-columns:repeat(13,1fr);gap:6px;}
  .card{
    background:var(--white);border:1.4px solid var(--line);border-radius:9px;
    padding:6px 2px 5px;text-align:center;cursor:pointer;transition:.16s;
    user-select:none;position:relative;
  }
  .card .yr{font-size:.58rem;color:var(--ink-soft);line-height:1.2;}
  .card .mo{font-size:1rem;font-weight:700;line-height:1.25;}
  .card .qtag{font-size:.54rem;color:#c98b3a;line-height:1.2;min-height:.7em;}
  .card:hover{border-color:var(--aqua);transform:translateY(-1px);}
  .card.active{
    background:linear-gradient(135deg,var(--aqua),var(--mint));
    border-color:var(--aqua);box-shadow:0 3px 9px rgba(120,180,180,.3);
  }
  .card.is-default .yr::before{content:"◆ ";color:#3f9c93;font-size:.5rem;}

  section.detail{background:var(--white);border-radius:14px;padding:13px 18px 16px;
    box-shadow:0 3px 10px rgba(150,140,125,.12);}
  .detail .head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .detail h2{font-size:1.1rem;}
  .detail .sub{font-size:.76rem;color:var(--ink-soft);}

  .alert{background:var(--cream);border-left:4px solid var(--peach);
    border-radius:7px;padding:6px 12px;margin-bottom:9px;font-size:.76rem;line-height:1.45;}
  .alert b{color:#c25b58;}
  .alert.none{border-left-color:var(--aqua);}
  .notebox{background:#fdeef0;border-left:4px solid var(--pink);
    border-radius:7px;padding:7px 12px;margin-bottom:9px;font-size:.76rem;line-height:1.5;color:var(--ink);}
  .notebox b{color:#c25b58;}
  .notebox a{color:#c2683a;font-weight:600;}
  .callink{margin-top:6px;font-size:.68rem;color:var(--ink-soft);}
  .callink a{color:#c2683a;font-weight:600;}

  table{width:100%;border-collapse:collapse;font-size:.8rem;}
  thead th{background:var(--cream);color:var(--ink);text-align:left;
    padding:5px 9px;border-bottom:2px solid var(--peach);white-space:nowrap;}
  tbody td{padding:4px 9px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:hover{background:#fffaf2;}
  .date{font-weight:700;white-space:nowrap;}
  .wkcell{white-space:nowrap;}
  .wk{display:inline-block;width:1.45em;height:1.45em;line-height:1.45em;text-align:center;
    border-radius:5px;font-size:.78rem;background:#f0ece4;color:var(--ink-soft);}
  .wk.weekend{background:var(--pink);color:#fff;font-weight:700;}
  .warn{color:#c25b58;font-size:.7rem;margin-left:5px;}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.7rem;
    white-space:nowrap;color:var(--ink);}
  .rule{color:var(--ink-soft);font-size:.72rem;white-space:nowrap;}

  .legend{margin-top:9px;font-size:.7rem;color:var(--ink-soft);
    display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .legend .tag{font-size:.66rem;}
  footer.note{margin-top:10px;font-size:.68rem;color:var(--ink-soft);line-height:1.55;}

  .modesw{display:flex;gap:8px;margin-bottom:11px;}
  .modebtn{cursor:pointer;background:var(--white);border:1.6px solid var(--line);
    border-radius:10px;padding:8px 18px;font-size:.9rem;font-weight:700;
    color:var(--ink-soft);user-select:none;transition:.15s;}
  .modebtn:hover{border-color:var(--aqua);}
  .modebtn.active{background:linear-gradient(135deg,var(--mint),var(--lilac));
    border-color:var(--aqua);color:var(--ink);box-shadow:0 3px 9px rgba(120,180,180,.22);}
  .revmeta{display:flex;flex-wrap:wrap;gap:4px 18px;font-size:.8rem;
    color:var(--ink-soft);margin-bottom:6px;}
  .revsec{font-size:.95rem;margin:15px 0 7px;color:var(--ink);
    border-left:4px solid var(--sage);padding-left:8px;}
  .revtable{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:2px;}
  .revtable thead th{background:var(--cream);text-align:left;padding:5px 9px;
    border-bottom:2px solid var(--peach);white-space:nowrap;}
  .revtable tbody td{padding:4px 9px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .revtable tbody tr:hover{background:#fffaf2;}
  .revno{color:var(--ink-soft);font-size:.74rem;}
  .revstar{color:#3f9c93;font-weight:700;}
  .revtime{white-space:nowrap;font-variant-numeric:tabular-nums;}

  @media print{body{background:#fff;}.card:not(.active){display:none;}
    .picker,.modesw{display:none;}section.detail,header.top{box-shadow:none;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1 id="h1title">FY26 財務決算時程表</h1>
      <div class="meta" id="metaLine">各部門決算作業預定時程 ｜ 來源：決算時程_各部.xlsx</div>
    </div>
    <div class="pills">
      <span class="pill" id="todayPill"></span>
      <span class="pill" id="pillYm">年月＝決算年月</span>
      <span class="pill" id="pillDefault">◆ 預設月</span>
    </div>
    <div class="langsw" id="langsw">
      <span class="langbtn" data-lang="ja">日文</span>
      <span class="langbtn" data-lang="zh">中文</span>
    </div>
  </header>

  <div class="modesw" id="modesw">
    <span class="modebtn active" data-mode="settle" id="modeSettleBtn">決算時程</span>
    <span class="modebtn" data-mode="revision" id="modeRevisionBtn">期中修正時程</span>
  </div>

  <div id="settleView">
  <section class="picker">
    <h2 id="pickerH2">選擇決算年月</h2>
    <div class="cards" id="cards"></div>
  </section>

  <section class="detail">
    <div class="head">
      <h2 id="detailTitle"></h2>
      <span class="sub" id="detailSub"></span>
    </div>
    <div id="alertBox"></div>
    <div id="noteBox"></div>
    <table>
      <thead><tr><th style="width:78px">日期</th><th style="width:70px">星期</th>
        <th>作業項目</th><th style="width:120px">分類</th><th style="width:140px">時點規則</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="legend" id="legend"></div>
    <footer class="note" id="footerNote">
      說明：「決算年月」為被結算月份，作業日多落在次月（例 2026/6月 的結算與提出作業集中在 7 月）。
      星期為紅底者代表週末（六/日）。財務定期會「操作說明」與「報告」FY26 同日，合併呈現。
    </footer>
    <div class="callink" id="calLink"></div>
  </section>
  </div><!-- /settleView -->

  <section class="detail revision" id="revisionView" style="display:none">
    <div class="head"><h2 id="revTitle"></h2></div>
    <div class="revmeta"><span id="revRange"></span><span id="revMembers"></span></div>
    <h3 class="revsec" id="revSecA"></h3>
    <table class="revtable"><thead id="revTheadA"></thead><tbody id="revBodyA"></tbody></table>
    <h3 class="revsec" id="revSecB"></h3>
    <table class="revtable"><thead id="revTheadB"></thead><tbody id="revBodyB"></tbody></table>
    <div class="callink" id="revHint"></div>
  </section>
</div>

      div.innerHTML = '<div class="yr">'+parts[0]+'</div><div class="mo">'+parts[1]+'</div>'+
        '<div class="qtag">'+(QUARTER_LABELS.has(o.label)?L().qtag:"")+'</div>';
      div.addEventListener("click",()=>{currentLabel=o.label;renderCards();renderDetail();});
      box.appendChild(div);
    });
  }

  function renderDetail(){
    const mo = MONTHS.find(o=>o.label===currentLabel);
    if(!mo) return;
    const t18 = L();
    document.getElementById("detailTitle").textContent = mo.label + t18.detailSuffix;
    document.getElementById("detailSub").textContent =
      t18.subCount(mo.tasks.length) + (QUARTER_LABELS.has(mo.label)?t18.subQuarter:"");

    const tasks = mo.tasks.slice().sort((a,b)=> (a.sort<b.sort?-1:a.sort>b.sort?1:0));

    const weekendDeadlines = tasks.filter(t=>t.we);
    const ab = document.getElementById("alertBox");
    if(weekendDeadlines.length){
      ab.className="alert";
      const list = weekendDeadlines.map(t=>trName(t.name)+"（"+t.md+" "+trWk(t.w)+"）").join(t18.alertJoin);
      ab.innerHTML = t18.alertWeekend(weekendDeadlines.length, list);
    } else {
      ab.className="alert none";
      ab.innerHTML = t18.alertNone;
    }

    // 該月專屬特別說明（如農曆春節長假）
    const nb = document.getElementById("noteBox");
    if(mo.note && mo.note[LANG]){
      nb.className="notebox";
      nb.innerHTML = mo.note[LANG];
    } else {
      nb.className="";
      nb.innerHTML = "";
    }

    const tb = document.getElementById("tbody");
    tb.innerHTML = "";
    // 依日期分組：同一天的多筆作業共用一格日期／星期（rowspan 垂直合併）
    const groups = [];
    tasks.forEach(t=>{
      const key = t.iso ? t.iso : ("t:"+t.text);
      const last = groups[groups.length-1];
      if(last && last.key===key){ last.items.push(t); }
      else groups.push({key:key, items:[t]});
    });
    groups.forEach(g=>{
      g.items.forEach((t,idx)=>{
        const tr = document.createElement("tr");
        const nm = trName(t.name), ct = trCat(t.cat), rl = trRule(t.rule), wk = trWk(t.w);
        let cells = "";
        if(idx===0){
          let dateCell, wkCell;
          if(t.iso){
            dateCell = '<span class="date">'+t.md+'</span>';
            wkCell = '<span class="wk'+(t.we?' weekend':'')+'">'+wk+'</span>'+(t.we?'<span class="warn">'+t18.holiday+'</span>':'');
          } else {
            dateCell = '<span class="date">'+trText(t.text)+'</span>';
            wkCell = '<span class="wk">—</span>';
          }
          const rs = g.items.length>1 ? ' rowspan="'+g.items.length+'"' : '';
          cells = '<td'+rs+'>'+dateCell+'</td><td class="wkcell"'+rs+'>'+wkCell+'</td>';
        }
        cells += '<td>'+nm+'</td>'+
          '<td><span class="tag" style="background:'+CAT_COLOR[t.cat]+'">'+ct+'</span></td>'+
          '<td class="rule">'+(rl||t18.dash)+'</td>';
        tr.innerHTML = cells;
        tb.appendChild(tr);
      });
    });

    renderLegend();
  }

  function renderLegend(){
    const lg = document.getElementById("legend");
    lg.innerHTML = "<span>"+L().legendLabel+"</span>" +
      Object.keys(CAT_COLOR).map(k=>'<span class="tag" style="background:'+CAT_COLOR[k]+'">'+trCat(k)+'</span>').join("");
  }

  let MODE = "settle";

  function renderRevision(){
    const t18 = L();
    document.getElementById("revTitle").textContent = t18.revTitle;
    document.getElementById("revRange").textContent = t18.revRange;
    document.getElementById("revMembers").textContent = t18.revMembers;
    document.getElementById("revSecA").textContent = t18.revSecA;
    document.getElementById("revSecB").textContent = t18.revSecB;
    document.getElementById("revHint").textContent = t18.revHint;

    // A. 作業時程（依 NO 分組，NO／提交部門以 rowspan 合併）
    document.getElementById("revTheadA").innerHTML = "<tr>" +
      t18.revThA.map((h,i)=>{
        const w = [' style="width:42px"','',' style="width:150px"',' style="width:64px"',' style="width:52px"',' style="width:78px"'][i]||'';
        return '<th'+w+'>'+h+'</th>';
      }).join("") + "</tr>";
    const gA=[];
    REVISION.tasks.forEach(t=>{
      const last=gA[gA.length-1];
      if(last && last.no===t.no) last.items.push(t); else gA.push({no:t.no,items:[t]});
    });
    let hA="";
    gA.forEach(g=>{
      g.items.forEach((t,idx)=>{
        const rs=g.items.length>1?' rowspan="'+g.items.length+'"':'';
        let row="<tr>";
        if(idx===0) row+='<td class="revno"'+rs+'>'+g.no+'</td>';
        row+='<td>'+trName(t.name)+'</td>';
        if(idx===0) row+='<td'+rs+' class="rule">'+trDept(t.dept)+'</td>';
        row+='<td class="date">'+t.md+'</td>'+
             '<td class="wkcell"><span class="wk'+(t.we?' weekend':'')+'">'+trWk(t.w)+'</span></td>'+
             '<td class="revstar">'+(t.star?t18.revStar:'')+'</td></tr>';
        hA+=row;
      });
    });
    document.getElementById("revBodyA").innerHTML=hA;

    // B. 小沼會議時程（依日期分組，日期／星期以 rowspan 合併）
    document.getElementById("revTheadB").innerHTML = "<tr>" +
      t18.revThB.map((h,i)=>{
        const w = [' style="width:64px"',' style="width:52px"',' style="width:110px"','',''][i]||'';
        return '<th'+w+'>'+h+'</th>';
      }).join("") + "</tr>";
    const gB=[];
    REVISION.meetings.forEach(m=>{
      const last=gB[gB.length-1];
      if(last && last.iso===m.iso) last.items.push(m); else gB.push({iso:m.iso,items:[m]});
    });
    let hB="";
    gB.forEach(g=>{
      g.items.forEach((m,idx)=>{
        const rs=g.items.length>1?' rowspan="'+g.items.length+'"':'';
        let row="<tr>";
        if(idx===0) row+='<td class="date"'+rs+'>'+m.md+'</td>'+
          '<td class="wkcell"'+rs+'><span class="wk">'+trWk(m.w)+'</span></td>';
        row+='<td class="revtime">'+m.start+'–'+m.end+'</td>'+
             '<td>'+trDept(m.dept)+'</td>'+
             '<td>'+m.reporter+'</td></tr>';
        hB+=row;
      });
    });
    document.getElementById("revBodyB").innerHTML=hB;
  }

  function setMode(mode){
    MODE = mode;
    document.querySelectorAll(".modebtn").forEach(b=>
      b.classList.toggle("active", b.dataset.mode===mode));
    document.getElementById("settleView").style.display = (mode==="settle")?"":"none";
    document.getElementById("revisionView").style.display = (mode==="revision")?"":"none";
    if(mode==="revision") renderRevision();
  }

  function applyStaticI18n(){
    const t18 = L();
    document.getElementById("h1title").textContent = t18.title;
    document.getElementById("metaLine").textContent = t18.meta;
    document.getElementById("pillYm").textContent = t18.pillYm;
    document.getElementById("pillDefault").textContent = t18.pillDefault;
    document.getElementById("pickerH2").textContent = t18.pickerH2;
    document.getElementById("footerNote").textContent = t18.footer;
    document.getElementById("calLink").innerHTML = t18.calLink;
    document.getElementById("modeSettleBtn").textContent = t18.modeSettle;
    document.getElementById("modeRevisionBtn").textContent = t18.modeRevision;
    document.title = t18.title;
    const ths = document.querySelectorAll("#settleView thead th");
    t18.th.forEach((v,i)=>{ if(ths[i]) ths[i].textContent = v; });
    const now = new Date();
    document.getElementById("todayPill").textContent =
      t18.today+" "+now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate();
  }

  function setLang(lang){
    LANG = lang;
    document.querySelectorAll(".langbtn").forEach(b=>
      b.classList.toggle("active", b.dataset.lang===lang));
    document.documentElement.lang = (lang==="ja") ? "ja" : "zh-Hant";
    applyStaticI18n();
    renderCards();
    renderDetail();
    if(MODE==="revision") renderRevision();
  }

  document.addEventListener("DOMContentLoaded",()=>{
    document.querySelectorAll(".langbtn").forEach(b=>
      b.addEventListener("click",()=>setLang(b.dataset.lang)));
    document.querySelectorAll(".modebtn").forEach(b=>
      b.addEventListener("click",()=>setMode(b.dataset.mode)));
    currentLabel = computeDefaultLabel();
    setLang(LANG);
  });
</script>
</body>
</html>
